name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ matrix.python-version }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.python-version }}-pip-

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install torch==2.2.2 torchvision==0.17.2 --index-url https://download.pytorch.org/whl/cpu
          pip install transformers==4.40.2 peft==0.10.0 accelerate==0.28.0
          pip install numpy pandas shapely pyproj mercantile Pillow pyyaml
          pip install pytest==8.1.1 pytest-cov==5.0.0

      - name: Generate synthetic training data
        run: python -m src.data.synthetic --n_train 200 --n_val 50 --output_dir data/processed/

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-config=pyproject.toml \
            --cov-report=term-missing \
            --cov-report=xml \
            -p no:warnings

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-xml
          path: coverage.xml

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check all source files
        run: |
          find src/ tests/ -name "*.py" | xargs python -m py_compile
          echo "All files compile cleanly ✅"
