<text x="277" y="272" font-size="9" fill="#28324a" text-anchor="middle">untr</text>
<text x="60" y="288" font-size="9" fill="#5b6b8c">RFLO learns it without weight transport; untrained/shuffled high</text>
<text x="394" y="54" font-size="11.5" font-weight="700" fill="#0b1324">(B) emergent grid code (frac periodic)</text>
