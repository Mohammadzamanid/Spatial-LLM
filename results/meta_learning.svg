<svg xmlns="http://www.w3.org/2000/svg" width="654" height="332" font-family="Segoe UI, Arial">
<rect width="654" height="332" fill="#ffffff"/>
<text x="26" y="24" font-size="15" font-weight="800" fill="#0b1324">A self-tuned learning rate from inferred volatility</text>
<text x="26" y="42" font-size="10.5" fill="#5b6b8c">the network raises its learning rate for volatility and LOWERS it for stochasticity &#8212; despite equal-or-higher variance; measured, not trained</text>
<text x="60" y="54" font-size="11.5" font-weight="700" fill="#0b1324">revealed learning rate α</text>
<line x1="60" y1="258" x2="310" y2="258" stroke="#33415c"/>
<rect x="78" y="116.1" width="52" height="141.9" fill="#3182bd" opacity="0.9"/>
<rect x="132" y="257.9" width="10" height="0.1" fill="#9aa6bd" opacity="0.7"/>
<text x="104" y="110" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">0.49</text>
<text x="104" y="272" font-size="9" fill="#28324a" text-anchor="middle">stable</text>
<rect x="152" y="88.0" width="52" height="170.0" fill="#2ca25f" opacity="0.9"/>
<rect x="206" y="257.8" width="10" height="0.2" fill="#9aa6bd" opacity="0.7"/>
<text x="178" y="82" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">0.59</text>
<text x="178" y="272" font-size="9" fill="#28324a" text-anchor="middle">volatile</text>
<rect x="226" y="159.3" width="52" height="98.7" fill="#c9341a" opacity="0.9"/>
<rect x="280" y="257.7" width="10" height="0.3" fill="#9aa6bd" opacity="0.7"/>
<text x="252" y="153" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">0.34</text>
<text x="252" y="272" font-size="9" fill="#28324a" text-anchor="middle">stochastic</text>
<text x="60" y="288" font-size="9" fill="#5b6b8c">grey = untrained control (flat)</text>
<text x="384" y="54" font-size="11.5" font-weight="700" fill="#0b1324">volatility ↑α, stochasticity ↓α</text>
<line x1="384" y1="258" x2="634" y2="258" stroke="#33415c"/>
<rect x="428" y="195.1" width="64" height="62.9" fill="#2ca25f" opacity="0.88"/>
<text x="460" y="189" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">+0.10</text>
<text x="460" y="272" font-size="9" fill="#28324a" text-anchor="middle">track</text>
<text x="460" y="283" font-size="9" fill="#28324a" text-anchor="middle">volatility</text>
<rect x="528" y="98.0" width="64" height="160.0" fill="#8039ef" opacity="0.88"/>
<text x="560" y="92" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">+0.25</text>
<text x="560" y="272" font-size="9" fill="#28324a" text-anchor="middle">dissociate</text>
<text x="560" y="283" font-size="9" fill="#28324a" text-anchor="middle">stochasticity</text>
<text x="384" y="292" font-size="9.5" fill="#5b6b8c">both are α-differences (95% CI); beats best fixed α (ratio 0.93)</text>
</svg>