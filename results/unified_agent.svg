<svg xmlns="http://www.w3.org/2000/svg" width="700" height="320" font-family="Segoe UI, Arial">
<rect width="700" height="320" fill="#ffffff"/>
<text x="20" y="26" font-size="15" font-weight="800" fill="#0b1324">The unified agent: four organs, one surviving animal (objective = stay alive only)</text>
<text x="20" y="45" font-size="10.5" fill="#5b6b8c">remove any organ and survival collapses in that organ&#8217;s own way; the uncertainty &amp; landmark organs only work as a pair</text>
<text x="44" y="74" font-size="11" font-weight="700" fill="#28324a">mean drive (lower = alive)</text>
<rect x="44" y="181" width="52" height="81" fill="#2ca25f" opacity="0.85"/>
<text x="70" y="176" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">36</text>
<text x="70" y="276" font-size="9" fill="#28324a" text-anchor="middle">intact</text>
<rect x="104" y="105" width="52" height="157" fill="#c9341a" opacity="0.85"/>
<text x="130" y="100" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">71</text>
<text x="130" y="276" font-size="9" fill="#28324a" text-anchor="middle">−grid</text>
<rect x="164" y="163" width="52" height="99" fill="#e6842a" opacity="0.85"/>
<text x="190" y="158" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">45</text>
<text x="190" y="276" font-size="9" fill="#28324a" text-anchor="middle">−uncert</text>
<rect x="224" y="163" width="52" height="99" fill="#c9341a" opacity="0.85"/>
<text x="250" y="158" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">45</text>
<text x="250" y="276" font-size="9" fill="#28324a" text-anchor="middle">−land</text>
<rect x="284" y="169" width="52" height="93" fill="#e6842a" opacity="0.85"/>
<text x="310" y="164" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">42</text>
<text x="310" y="276" font-size="9" fill="#28324a" text-anchor="middle">−drive</text>
<line x1="40" y1="262" x2="344" y2="262" stroke="#33415c"/>
<line x1="40" y1="181" x2="344" y2="181" stroke="#2ca25f" stroke-dasharray="3 3" opacity="0.5"/>
<text x="470" y="74" font-size="11" font-weight="700" fill="#28324a">cost of losing the</text>
<text x="470" y="88" font-size="11" font-weight="700" fill="#28324a">uncertainty organ</text>
<rect x="470" y="139" width="80" height="123" fill="#2b8cbe" opacity="0.85"/>
<text x="510" y="134" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">+8</text>
<text x="510" y="275" font-size="9" fill="#28324a" text-anchor="middle">with</text>
<text x="510" y="286" font-size="9" fill="#28324a" text-anchor="middle">landmarks</text>
<rect x="570" y="262" width="80" height="0" fill="#8c8c8c" opacity="0.85"/>
<text x="610" y="257" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">+0</text>
<text x="610" y="275" font-size="9" fill="#28324a" text-anchor="middle">landmarks</text>
<text x="610" y="286" font-size="9" fill="#28324a" text-anchor="middle">gone</text>
<line x1="466" y1="262" x2="650" y2="262" stroke="#33415c"/>
<text x="470" y="304" font-size="9.5" fill="#5a6b8c">knowing you&#8217;re lost only helps if you can re-anchor:</text>
<text x="470" y="316" font-size="9.5" fill="#5a6b8c">the organs are a circuit, not independent parts.</text>
</svg>