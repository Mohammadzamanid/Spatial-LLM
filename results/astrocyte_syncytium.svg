<svg xmlns="http://www.w3.org/2000/svg" width="654" height="328" font-family="Segoe UI, Arial">
<rect width="654" height="328" fill="#ffffff"/>
<text x="26" y="24" font-size="15" font-weight="800" fill="#0b1324">Astrocyte syncytium: plasticity gated by spatial density of co-activity</text>
<text x="26" y="42" font-size="10.5" fill="#5b6b8c">clustered co-active synapses pool enough Ca&#178; to potentiate where the same number scattered do not; a point-wise astrocyte can’t tell them apart, a regenerative wave floods</text>
<text x="60" y="56" font-size="11.5" font-weight="700" fill="#0b1324">(A) potentiation gate: clustered vs scattered</text>
<line x1="60" y1="250" x2="310" y2="250" stroke="#33415c"/>
<rect x="78" y="183.5" width="22" height="66.5" fill="#2ca25f" opacity="0.9"/>
<text x="89" y="180" font-size="8.5" font-weight="700" fill="#0b1324" text-anchor="middle">0.40</text>
<rect x="104" y="238.2" width="22" height="11.8" fill="#c9341a" opacity="0.9"/>
<text x="115" y="234" font-size="8.5" font-weight="700" fill="#0b1324" text-anchor="middle">0.07</text>
<text x="102" y="263" font-size="8.5" fill="#28324a" text-anchor="middle">syncytium</text>
<rect x="156" y="250.0" width="22" height="0.0" fill="#2ca25f" opacity="0.9"/>
<text x="167" y="246" font-size="8.5" font-weight="700" fill="#0b1324" text-anchor="middle">0.00</text>
<rect x="182" y="250.0" width="22" height="0.0" fill="#c9341a" opacity="0.9"/>
<text x="193" y="246" font-size="8.5" font-weight="700" fill="#0b1324" text-anchor="middle">0.00</text>
<text x="180" y="263" font-size="8.5" fill="#28324a" text-anchor="middle">uncoupled</text>
<rect x="234" y="84.0" width="22" height="166.0" fill="#2ca25f" opacity="0.9"/>
<text x="245" y="80" font-size="8.5" font-weight="700" fill="#0b1324" text-anchor="middle">1.00</text>
<rect x="260" y="84.0" width="22" height="166.0" fill="#c9341a" opacity="0.9"/>
<text x="271" y="80" font-size="8.5" font-weight="700" fill="#0b1324" text-anchor="middle">1.00</text>
<text x="258" y="263" font-size="8.5" fill="#28324a" text-anchor="middle">regen wave</text>
<text x="60" y="280" font-size="9" fill="#2ca25f">green = clustered</text>
<text x="170" y="280" font-size="9" fill="#c9341a">red = scattered (matched count)</text>
<text x="60" y="292" font-size="9" fill="#5b6b8c">only the syncytium separates them; uncoupled=both low, regen wave=both flood</text>
<text x="384" y="56" font-size="11.5" font-weight="700" fill="#0b1324">(B) heterosynaptic binding of a silent gap</text>
<line x1="384" y1="250" x2="634" y2="250" stroke="#33415c"/>
<rect x="428" y="92.9" width="64" height="157.1" fill="#2ca25f" opacity="0.9"/>
<text x="460" y="87" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">0.95</text>
<text x="460" y="263" font-size="8.5" fill="#28324a" text-anchor="middle">syncytium</text>
<text x="460" y="273" font-size="8.5" fill="#28324a" text-anchor="middle">(bound)</text>
<rect x="528" y="250.0" width="64" height="0.0" fill="#c9341a" opacity="0.9"/>
<text x="560" y="244" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">0.00</text>
<text x="560" y="263" font-size="8.5" fill="#28324a" text-anchor="middle">point-wise</text>
<text x="560" y="273" font-size="8.5" fill="#28324a" text-anchor="middle">(silent)</text>
<text x="384" y="286" font-size="9" fill="#5b6b8c">a silent synapse surrounded by active ones is recruited by pooled neighbour Ca&#178;</text>
</svg>