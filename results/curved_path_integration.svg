<svg xmlns="http://www.w3.org/2000/svg" width="700" height="320" font-family="Segoe UI, Arial">
<rect width="700" height="320" fill="#ffffff"/>
<text x="20" y="26" font-size="15" font-weight="800" fill="#0b1324">Non-Euclidean path integration: a flat compass reads curvature as loop-closure holonomy (Gauss-Bonnet)</text>
<text x="50" y="58" font-size="11" font-weight="700" fill="#28324a">(A) holonomy = enclosed area × curvature</text>
<rect x="50" y="66" width="250" height="210" fill="none" stroke="#c8d0e0"/>
<line x1="50" y1="276" x2="300" y2="66" stroke="#9aa7c0" stroke-dasharray="4 3"/>
<text x="230" y="80" font-size="8.5" fill="#9aa7c0">y = x</text>
<circle cx="69.7" cy="259.4" r="4.5" fill="#2ca25f" opacity="0.9"/>
<circle cx="125.8" cy="212.3" r="4.5" fill="#2ca25f" opacity="0.9"/>
<circle cx="209.4" cy="142.1" r="4.5" fill="#2ca25f" opacity="0.9"/>
<circle cx="300.0" cy="66.0" r="4.5" fill="#2ca25f" opacity="0.9"/>
<circle cx="112.5" cy="223.6" r="5" fill="#e6550d"/>
<text x="120" y="228" font-size="8.5" fill="#e6550d">3 right angles → π/2</text>
<text x="56" y="80" font-size="9" fill="#2ca25f">slope 1.00, corr 1.00</text>
<text x="175" y="292" font-size="9" fill="#28324a" text-anchor="middle">enclosed solid angle (area × curvature) &#8594;</text>
<text x="12" y="171" font-size="9" fill="#28324a" text-anchor="middle" transform="rotate(-90 12 171)">measured holonomy &#8594;</text>
<text x="360" y="58" font-size="11" font-weight="700" fill="#28324a">(B/C) flat vs curved: holonomy &amp; homing</text>
<rect x="360" y="272" width="52" height="4" fill="#c9341a" opacity="0.85"/>
<text x="386" y="267" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">0.03</text>
<text x="386" y="289" font-size="8.5" fill="#28324a" text-anchor="middle">flat</text>
<text x="386" y="300" font-size="8.5" fill="#28324a" text-anchor="middle">holonomy</text>
<rect x="432" y="82" width="52" height="194" fill="#2ca25f" opacity="0.85"/>
<text x="458" y="77" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">1.57</text>
<text x="458" y="289" font-size="8.5" fill="#28324a" text-anchor="middle">curved</text>
<text x="458" y="300" font-size="8.5" fill="#28324a" text-anchor="middle">holonomy</text>
<rect x="504" y="272" width="52" height="4" fill="#c9341a" opacity="0.85"/>
<text x="530" y="267" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">0.03</text>
<text x="530" y="289" font-size="8.5" fill="#28324a" text-anchor="middle">flat</text>
<text x="530" y="300" font-size="8.5" fill="#28324a" text-anchor="middle">miss</text>
<rect x="576" y="66" width="52" height="210" fill="#2b8cbe" opacity="0.85"/>
<text x="602" y="61" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">1.98</text>
<text x="602" y="289" font-size="8.5" fill="#28324a" text-anchor="middle">curved</text>
<text x="602" y="300" font-size="8.5" fill="#28324a" text-anchor="middle">miss</text>
<line x1="360" y1="276" x2="648" y2="276" stroke="#33415c"/>
<text x="360" y="316" font-size="9" fill="#5a6b8c">flat world: holonomy and homing miss are 0 (loops close);</text>
<text x="360" y="328" font-size="9" fill="#5a6b8c">curved world: both grow with area × curvature.</text>
</svg>