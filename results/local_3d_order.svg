<svg xmlns="http://www.w3.org/2000/svg" width="564" height="400" font-family="Segoe UI, Arial">
<rect width="564" height="400" fill="#ffffff"/>
<text x="26" y="24" font-size="15" font-weight="800" fill="#0b1324">Local 3D order without a global lattice: the bat grid regime</text>
<text x="26" y="42" font-size="10.5" fill="#5b6b8c">two independent axes: regular spacing (local) vs long-range periodicity (global lattice)</text>
<rect x="64" y="58" width="300" height="300" fill="none" stroke="#33415c"/>
<text x="58" y="361" font-size="9" fill="#5b6b8c" text-anchor="end">0.0</text>
<text x="64" y="372" font-size="9" fill="#5b6b8c" text-anchor="middle">0.0</text>
<text x="58" y="211" font-size="9" fill="#5b6b8c" text-anchor="end">0.5</text>
<text x="214" y="372" font-size="9" fill="#5b6b8c" text-anchor="middle">0.5</text>
<text x="58" y="61" font-size="9" fill="#5b6b8c" text-anchor="end">1.0</text>
<text x="364" y="372" font-size="9" fill="#5b6b8c" text-anchor="middle">1.0</text>
<text x="214" y="386" font-size="10" fill="#28324a" text-anchor="middle">LOCAL order (regular spacing) &#8594;</text>
<text x="24" y="208" font-size="10" fill="#28324a" text-anchor="middle" transform="rotate(-90 24 208)">GLOBAL lattice (periodicity) &#8594;</text>
<circle cx="346.0" cy="92.8" r="8" fill="#3182bd" opacity="0.9"/>
<text x="358.0" y="96.8" font-size="10" font-weight="700" fill="#3182bd">global lattice</text>
<circle cx="349.6" cy="343.3" r="8" fill="#2ca25f" opacity="0.9"/>
<text x="361.6" y="347.3" font-size="10" font-weight="700" fill="#2ca25f">LOCAL-order (bat)</text>
<circle cx="260.2" cy="342.1" r="8" fill="#c9341a" opacity="0.9"/>
<text x="272.2" y="346.1" font-size="10" font-weight="700" fill="#c9341a">random</text>
<text x="214" y="79" font-size="8.5" fill="#7787a6" text-anchor="middle">crystal (high both)</text>
<text x="319" y="304" font-size="8.5" fill="#2ca25f" text-anchor="middle">bat: local, no lattice</text>
</svg>