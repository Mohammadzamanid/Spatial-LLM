<svg xmlns="http://www.w3.org/2000/svg" width="654" height="328" font-family="Segoe UI, Arial">
<rect width="654" height="328" fill="#ffffff"/>
<text x="26" y="24" font-size="15" font-weight="800" fill="#0b1324">Grid shearing: the hexagonal grid deforms with environmental geometry</text>
<text x="26" y="42" font-size="10.5" fill="#5b6b8c">the grid stays hexagonal in a square but shears in a trapezoid under the same anchoring; deformation needs BOTH geometry and anchoring — never drawn</text>
<text x="60" y="56" font-size="11.5" font-weight="700" fill="#0b1324">(A) gridness: square vs trapezoid (both anchored)</text>
<line x1="60" y1="250" x2="310" y2="250" stroke="#33415c"/>
<line x1="60" y1="250" x2="310" y2="250" stroke="#9aa6bd"/>
<rect x="82" y="106.2" width="52" height="143.8" fill="#2ca25f" opacity="0.9"/>
<text x="108" y="100" font-size="10" font-weight="700" fill="#0b1324" text-anchor="middle">+1.00</text>
<text x="108" y="263" font-size="8.3" fill="#28324a" text-anchor="middle">square</text>
<text x="108" y="273" font-size="8.3" fill="#28324a" text-anchor="middle">+anchor</text>
<rect x="156" y="164.0" width="52" height="86.0" fill="#c98a1a" opacity="0.9"/>
<text x="182" y="158" font-size="10" font-weight="700" fill="#0b1324" text-anchor="middle">+0.60</text>
<text x="182" y="263" font-size="8.3" fill="#28324a" text-anchor="middle">½ shear</text>
<text x="182" y="273" font-size="8.3" fill="#28324a" text-anchor="middle">+anchor</text>
<rect x="230" y="249.0" width="52" height="1.0" fill="#c9341a" opacity="0.9"/>
<text x="256" y="243" font-size="10" font-weight="700" fill="#0b1324" text-anchor="middle">+0.01</text>
<text x="256" y="263" font-size="8.3" fill="#28324a" text-anchor="middle">TRAPEZOID</text>
<text x="256" y="273" font-size="8.3" fill="#28324a" text-anchor="middle">+anchor</text>
<text x="60" y="286" font-size="9" fill="#5b6b8c">the grid shears more as the geometry polarizes (dose-response)</text>
<text x="384" y="56" font-size="11.5" font-weight="700" fill="#0b1324">(B) double dissociation (needs geometry AND anchoring)</text>
<line x1="384" y1="250" x2="634" y2="250" stroke="#33415c"/>
<line x1="384" y1="250" x2="634" y2="250" stroke="#9aa6bd"/>
<rect x="406" y="106.2" width="52" height="143.8" fill="#2ca25f" opacity="0.9"/>
<text x="432" y="100" font-size="10" font-weight="700" fill="#0b1324" text-anchor="middle">+1.00</text>
<text x="432" y="263" font-size="8.3" fill="#28324a" text-anchor="middle">square</text>
<text x="432" y="273" font-size="8.3" fill="#28324a" text-anchor="middle">+anchor</text>
<rect x="480" y="85.2" width="52" height="164.8" fill="#2ca25f" opacity="0.9"/>
<text x="506" y="79" font-size="10" font-weight="700" fill="#0b1324" text-anchor="middle">+1.14</text>
<text x="506" y="263" font-size="8.3" fill="#28324a" text-anchor="middle">trapezoid</text>
<text x="506" y="273" font-size="8.3" fill="#28324a" text-anchor="middle">NO anchor</text>
<rect x="554" y="249.0" width="52" height="1.0" fill="#c9341a" opacity="0.9"/>
<text x="580" y="243" font-size="10" font-weight="700" fill="#0b1324" text-anchor="middle">+0.01</text>
<text x="580" y="263" font-size="8.3" fill="#28324a" text-anchor="middle">TRAPEZOID</text>
<text x="580" y="273" font-size="8.3" fill="#28324a" text-anchor="middle">+anchor</text>
<text x="384" y="286" font-size="9" fill="#5b6b8c">only trapezoid+anchoring deforms; each ingredient alone keeps it hexagonal</text>
</svg>