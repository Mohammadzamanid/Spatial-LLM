<svg xmlns="http://www.w3.org/2000/svg" width="654" height="328" font-family="Segoe UI, Arial">
<rect width="654" height="328" fill="#ffffff"/>
<text x="26" y="24" font-size="15" font-weight="800" fill="#0b1324">Ephaptic coupling: a non-synaptic field shapes spike timing</text>
<text x="26" y="42" font-size="10.5" fill="#5b6b8c">a zero-mean self-field synchronizes spike timing at MATCHED firing rate, where matched-budget sparse synapses cannot; zeroing the field abolishes it</text>
<text x="60" y="56" font-size="11.5" font-weight="700" fill="#0b1324">(A) spike synchrony chi (matched rate)</text>
<line x1="60" y1="250" x2="310" y2="250" stroke="#33415c"/>
<rect x="80" y="84.2" width="52" height="165.8" fill="#2ca25f" opacity="0.9"/>
<text x="106" y="78" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">1.00</text>
<text x="106" y="263" font-size="8.5" fill="#28324a" text-anchor="middle">ephaptic</text>
<text x="106" y="273" font-size="8.5" fill="#28324a" text-anchor="middle">field</text>
<rect x="154" y="231.9" width="52" height="18.1" fill="#c98a1a" opacity="0.9"/>
<text x="180" y="226" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">0.11</text>
<text x="180" y="263" font-size="8.5" fill="#28324a" text-anchor="middle">sparse syn</text>
<text x="180" y="273" font-size="8.5" fill="#28324a" text-anchor="middle">(matched)</text>
<rect x="228" y="238.1" width="52" height="11.9" fill="#c9341a" opacity="0.9"/>
<text x="254" y="232" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">0.07</text>
<text x="254" y="263" font-size="8.5" fill="#28324a" text-anchor="middle">field OFF</text>
<text x="60" y="286" font-size="9" fill="#5b6b8c">rates matched to 1.0; the field changes TIMING, not rate</text>
<text x="384" y="56" font-size="11.5" font-weight="700" fill="#0b1324">(B) downstream coincidence detector</text>
<line x1="384" y1="250" x2="634" y2="250" stroke="#33415c"/>
<rect x="428" y="84.0" width="64" height="166.0" fill="#2ca25f" opacity="0.9"/>
<text x="460" y="78" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">0.22</text>
<text x="460" y="263" font-size="8.5" fill="#28324a" text-anchor="middle">ephaptic</text>
<text x="460" y="273" font-size="8.5" fill="#28324a" text-anchor="middle">field</text>
<rect x="528" y="244.1" width="64" height="5.9" fill="#c9341a" opacity="0.9"/>
<text x="560" y="238" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">0.01</text>
<text x="560" y="263" font-size="8.5" fill="#28324a" text-anchor="middle">field OFF</text>
<text x="384" y="286" font-size="9" fill="#5b6b8c">coincidence rate on the assembly — synchrony does readable work at matched rate</text>
</svg>