<text x="256" y="97" font-size="9" fill="#8c8c8c">blind slope 0.09</text>
<text x="335" y="254" font-size="9" fill="#28324a" text-anchor="middle">Bayes-optimal w* &#8594;</text>
<text x="480" y="62" font-size="11" font-weight="700" fill="#28324a">(C) inflate ρ → Δ landmark trust</text>
<rect x="480" y="70" width="60" height="170" fill="#2b8cbe" opacity="0.85"/>
