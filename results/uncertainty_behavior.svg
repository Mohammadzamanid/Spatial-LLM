<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" font-family="Segoe UI, Arial">
<rect width="720" height="300" fill="#ffffff"/>
<text x="20" y="26" font-size="15" font-weight="800" fill="#0b1324">Explicit uncertainty that drives behavior: a calibrated population read-out weights cues &amp; triggers re-anchoring</text>
<text x="40" y="62" font-size="11" font-weight="700" fill="#28324a">(A) ρ↔error calibration</text>
<rect x="40" y="92" width="46" height="148" fill="#2ca25f" opacity="0.85"/>
