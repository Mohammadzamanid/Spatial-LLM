<text x="63" y="254" font-size="9" fill="#28324a" text-anchor="middle">indep</text>
<rect x="110" y="208" width="46" height="32" fill="#c9341a" opacity="0.85"/>
<text x="133" y="203" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">0.19</text>
<text x="133" y="254" font-size="9" fill="#28324a" text-anchor="middle">shared</text>
<line x1="40" y1="240" x2="180" y2="240" stroke="#33415c"/>
