<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" font-family="Segoe UI, Arial">
<rect width="760" height="320" fill="#ffffff"/>
<text x="20" y="26" font-size="15" font-weight="800" fill="#0b1324">Intrinsic motivation: self-directed mastery emerges &#8212; and escapes the noisy-TV trap</text>
<text x="20" y="45" font-size="10.5" fill="#5b6b8c">no external reward, no goal &#8212; the agent acts only to improve its own world model; behaviour is measured, never imposed</text>
<text x="44" y="92" font-size="11" font-weight="700" fill="#28324a">cells mastered (of 77)</text>
<rect x="44" y="100" width="46" height="150" fill="#2ca25f" opacity="0.85"/>
<text x="67" y="95" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">77</text>
<text x="67" y="263" font-size="9" fill="#28324a" text-anchor="middle">learning</text>
<text x="67" y="274" font-size="9" fill="#28324a" text-anchor="middle">progress</text>
<rect x="100" y="100" width="46" height="150" fill="#e6842a" opacity="0.85"/>
<text x="123" y="95" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">77</text>
<text x="123" y="263" font-size="9" fill="#28324a" text-anchor="middle">pure</text>
<text x="123" y="274" font-size="9" fill="#28324a" text-anchor="middle">novelty</text>
<rect x="156" y="167" width="46" height="83" fill="#8c8c8c" opacity="0.85"/>
<text x="179" y="162" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">43</text>
<text x="179" y="263" font-size="9" fill="#28324a" text-anchor="middle">random</text>
<line x1="40" y1="250" x2="212" y2="250" stroke="#33415c"/>
<text x="44" y="288" font-size="8.5" fill="#5b6b8c">drive organises exploration</text>
<text x="300" y="92" font-size="11" font-weight="700" fill="#28324a">time trapped on the noise</text>
<rect x="300" y="211" width="60" height="39" fill="#2ca25f" opacity="0.85"/>
<text x="330" y="206" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">10%</text>
<text x="330" y="263" font-size="9" fill="#28324a" text-anchor="middle">learning</text>
<text x="330" y="274" font-size="9" fill="#28324a" text-anchor="middle">progress</text>
<rect x="378" y="135" width="60" height="115" fill="#e6842a" opacity="0.85"/>
<text x="408" y="130" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">31%</text>
<text x="408" y="263" font-size="9" fill="#28324a" text-anchor="middle">pure</text>
<text x="408" y="274" font-size="9" fill="#28324a" text-anchor="middle">novelty</text>
<line x1="296" y1="250" x2="456" y2="250" stroke="#33415c"/>
<text x="300" y="288" font-size="8.5" fill="#5b6b8c">novelty is fooled by noise</text>
<text x="540" y="92" font-size="11" font-weight="700" fill="#28324a">steps to 90% mastery</text>
<rect x="540" y="216" width="48" height="34" fill="#2ca25f" opacity="0.85"/>
<text x="564" y="211" font-size="10" font-weight="700" fill="#0b1324" text-anchor="middle">352</text>
<text x="564" y="263" font-size="9" fill="#28324a" text-anchor="middle">learning</text>
<text x="564" y="274" font-size="9" fill="#28324a" text-anchor="middle">progress</text>
<rect x="598" y="207" width="48" height="43" fill="#e6842a" opacity="0.85"/>
<text x="622" y="202" font-size="10" font-weight="700" fill="#0b1324" text-anchor="middle">437</text>
<text x="622" y="263" font-size="9" fill="#28324a" text-anchor="middle">pure</text>
<text x="622" y="274" font-size="9" fill="#28324a" text-anchor="middle">novelty</text>
<rect x="656" y="114" width="48" height="136" fill="#8c8c8c" opacity="0.85"/>
<text x="680" y="109" font-size="10" font-weight="700" fill="#0b1324" text-anchor="middle">1400</text>
<text x="680" y="263" font-size="9" fill="#28324a" text-anchor="middle">random</text>
<line x1="536" y1="250" x2="714" y2="250" stroke="#33415c"/>
<text x="540" y="288" font-size="8.5" fill="#5b6b8c">random never reaches 90%</text>
<text x="20" y="308" font-size="9.5" fill="#5b6b8c">Learning progress = across-visit error REDUCTION (noise can't fake it). Both intrinsic drives explore; only learning progress avoids the trap.</text>
</svg>