<text x="108" y="263" font-size="8.5" fill="#28324a" text-anchor="middle">held-out</text>
<text x="108" y="273" font-size="8.5" fill="#28324a" text-anchor="middle">HD</text>
<rect x="156" y="183.4" width="52" height="66.6" fill="#c98a1a" opacity="0.9"/>
<text x="182" y="177" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">0.90</text>
<text x="182" y="263" font-size="8.5" fill="#28324a" text-anchor="middle">shuffled</text>
<text x="182" y="273" font-size="8.5" fill="#28324a" text-anchor="middle">HD</text>
<rect x="230" y="84.0" width="52" height="166.0" fill="#c9341a" opacity="0.9"/>
<text x="256" y="78" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">2.24</text>
<text x="256" y="263" font-size="8.5" fill="#28324a" text-anchor="middle">no</text>
<text x="256" y="273" font-size="8.5" fill="#28324a" text-anchor="middle">HD</text>
<text x="60" y="286" font-size="9" fill="#5b6b8c">held-out HD is near-zero (generalizes); wrong/removed HD explodes</text>
<text x="384" y="56" font-size="11.5" font-weight="700" fill="#0b1324">(B) emergent gain-field code (extra R&#178;)</text>
<line x1="384" y1="250" x2="634" y2="250" stroke="#33415c"/>
