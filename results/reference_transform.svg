<text x="560" y="263" font-size="8.5" fill="#28324a" text-anchor="middle">untrained</text>
<text x="560" y="273" font-size="8.5" fill="#28324a" text-anchor="middle">(init)</text>
<text x="384" y="286" font-size="9" fill="#5b6b8c">27% of units become gain fields (multiplicative ego&#215;HD) with training</text>
