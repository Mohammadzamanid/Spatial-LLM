<text x="26" y="42" font-size="10.5" fill="#5b6b8c">trained only on allocentric output, it generalizes to unseen head directions (learned the rotation) and cannot work without the heading; gain-field units emerge</text>
<text x="60" y="56" font-size="11.5" font-weight="700" fill="#0b1324">(A) transform error (RMSE, lower=better)</text>
