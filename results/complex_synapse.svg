<text x="185" y="274" font-size="9.5" fill="#5b6b8c" text-anchor="middle">memory age (log) &#8594;</text>
<text x="384" y="54" font-size="11.5" font-weight="700" fill="#0b1324">(B) memory lifetime vs chain depth</text>
<line x1="384" y1="258" x2="634" y2="258" stroke="#33415c"/>
