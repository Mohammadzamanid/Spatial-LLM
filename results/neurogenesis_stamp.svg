<svg xmlns="http://www.w3.org/2000/svg" width="700" height="300" font-family="Segoe UI, Arial">
<rect width="700" height="300" fill="#ffffff"/>
<text x="20" y="26" font-size="15" font-weight="800" fill="#0b1324">Adult neurogenesis: a turning-over young cohort stamps time &amp; shields old memories</text>
<text x="20" y="45" font-size="10.5" fill="#5b6b8c">time is never encoded; content is random &#8212; the temporal signal and the retention both come from the cohort turnover</text>
<text x="44" y="74" font-size="11" font-weight="700" fill="#28324a">temporal stamp</text>
<rect x="44" y="147" width="56" height="100" fill="#2ca25f" opacity="0.85"/>
<text x="72" y="142" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">-0.60</text>
<text x="72" y="260" font-size="9" fill="#28324a" text-anchor="middle">neuro</text>
<text x="72" y="271" font-size="9" fill="#28324a" text-anchor="middle">|corr|</text>
<rect x="120" y="247" width="56" height="0" fill="#c9341a" opacity="0.85"/>
<text x="148" y="242" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">+0.00</text>
<text x="148" y="260" font-size="9" fill="#28324a" text-anchor="middle">static</text>
<text x="148" y="271" font-size="9" fill="#28324a" text-anchor="middle">|corr|</text>
<line x1="40" y1="247" x2="186" y2="247" stroke="#33415c"/>
<text x="44" y="287" font-size="9" fill="#5b6b8c">near/far AUC 0.96 vs 0.50</text>
<text x="270" y="74" font-size="11" font-weight="700" fill="#28324a">recall of OLD memories</text>
<rect x="270" y="175" width="66" height="72" fill="#2ca25f" opacity="0.85"/>
<text x="303" y="170" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">0.44</text>
<text x="303" y="260" font-size="9" fill="#28324a" text-anchor="middle">neuro</text>
<rect x="354" y="196" width="66" height="51" fill="#c9341a" opacity="0.85"/>
<text x="387" y="191" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">0.31</text>
<text x="387" y="260" font-size="9" fill="#28324a" text-anchor="middle">static</text>
<line x1="266" y1="247" x2="420" y2="247" stroke="#33415c"/>
