<svg xmlns="http://www.w3.org/2000/svg" width="780" height="320" font-family="Segoe UI, Arial">
<rect width="780" height="320" fill="#ffffff"/>
<text x="20" y="26" font-size="15" font-weight="800" fill="#0b1324">Imagination &#8594; planning: think before acting, and it emerges</text>
<text x="20" y="45" font-size="10.5" fill="#5b6b8c">roll the learned forward model forward, pick the rollout closest to the goal &#8212; no planner hand-written; a detour is solved</text>
<text x="44" y="92" font-size="11" font-weight="700" fill="#28324a">success vs imagination horizon</text>
<rect x="44" y="205" width="46" height="45" fill="#c9341a" opacity="0.85"/>
<text x="67" y="200" font-size="10" font-weight="700" fill="#0b1324" text-anchor="middle">30%</text>
<text x="67" y="263" font-size="9" fill="#28324a" text-anchor="middle">H=1</text>
<rect x="102" y="100" width="46" height="150" fill="#2ca25f" opacity="0.85"/>
<text x="125" y="95" font-size="10" font-weight="700" fill="#0b1324" text-anchor="middle">100%</text>
<text x="125" y="263" font-size="9" fill="#28324a" text-anchor="middle">H=4</text>
<rect x="160" y="100" width="46" height="150" fill="#2ca25f" opacity="0.85"/>
<text x="183" y="95" font-size="10" font-weight="700" fill="#0b1324" text-anchor="middle">100%</text>
<text x="183" y="263" font-size="9" fill="#28324a" text-anchor="middle">H=12</text>
<line x1="40" y1="250" x2="218" y2="250" stroke="#33415c"/>
<text x="44" y="284" font-size="8.5" fill="#5b6b8c">H=1 = bare 1-step model (myopic)</text>
<text x="300" y="92" font-size="11" font-weight="700" fill="#28324a">detour success</text>
<rect x="300" y="100" width="52" height="150" fill="#2ca25f" opacity="0.85"/>
<text x="326" y="95" font-size="10" font-weight="700" fill="#0b1324" text-anchor="middle">100%</text>
<text x="326" y="263" font-size="9" fill="#28324a" text-anchor="middle">planner</text>
<rect x="364" y="250" width="52" height="0" fill="#c9341a" opacity="0.85"/>
<text x="390" y="245" font-size="10" font-weight="700" fill="#0b1324" text-anchor="middle">0%</text>
<text x="390" y="263" font-size="9" fill="#28324a" text-anchor="middle">reactive</text>
<text x="390" y="274" font-size="9" fill="#28324a" text-anchor="middle">(habit)</text>
<rect x="428" y="250" width="52" height="0" fill="#8c8c8c" opacity="0.85"/>
<text x="454" y="245" font-size="10" font-weight="700" fill="#0b1324" text-anchor="middle">0%</text>
<text x="454" y="263" font-size="9" fill="#28324a" text-anchor="middle">broken</text>
<text x="454" y="274" font-size="9" fill="#28324a" text-anchor="middle">model</text>
<line x1="296" y1="250" x2="492" y2="250" stroke="#33415c"/>
<text x="585" y="92" font-size="11" font-weight="700" fill="#28324a">moved-goal revaluation</text>
<rect x="585" y="100" width="60" height="150" fill="#2ca25f" opacity="0.85"/>
<text x="615" y="95" font-size="10" font-weight="700" fill="#0b1324" text-anchor="middle">100%</text>
<text x="615" y="263" font-size="9" fill="#28324a" text-anchor="middle">planner</text>
<rect x="663" y="150" width="60" height="100" fill="#c9341a" opacity="0.85"/>
<text x="693" y="145" font-size="10" font-weight="700" fill="#0b1324" text-anchor="middle">67%</text>
<text x="693" y="263" font-size="9" fill="#28324a" text-anchor="middle">reactive</text>
<line x1="581" y1="250" x2="741" y2="250" stroke="#33415c"/>
<text x="585" y="280" font-size="8.5" fill="#5b6b8c">zero-shot to new goals</text>
<text x="20" y="308" font-size="9.5" fill="#5b6b8c">Planning is imagination pointed at a goal: simulate futures, pick the best. Flexible, model-based, and needs the multi-step rollout.</text>
</svg>