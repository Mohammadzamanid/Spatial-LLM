<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" font-family="Segoe UI, Arial">
<rect width="760" height="320" fill="#ffffff"/>
<text x="20" y="26" font-size="15" font-weight="800" fill="#0b1324">Anisotropic 3-D coding: vertical coarsening EMERGES from gravity-biased experience</text>
<text x="20" y="45" font-size="10.5" fill="#5b6b8c">isotropic hardware (noise, init, budget all equal) &#8212; only the experience is gravity-biased; nothing about the anisotropy imposed</text>
<text x="44" y="88" font-size="11" font-weight="700" fill="#28324a">normalized error (resolution)</text>
<rect x="44" y="211" width="52" height="35" fill="#2b8cbe" opacity="0.85"/>
<text x="70" y="206" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">0.15</text>
<text x="70" y="259" font-size="9" fill="#28324a" text-anchor="middle">horizontal</text>
<rect x="112" y="131" width="52" height="115" fill="#c9341a" opacity="0.85"/>
<text x="138" y="126" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">0.50</text>
<text x="138" y="259" font-size="9" fill="#28324a" text-anchor="middle">VERTICAL</text>
<line x1="40" y1="246" x2="180" y2="246" stroke="#33415c"/>
<text x="44" y="278" font-size="12" font-weight="800" fill="#c9341a">ratio 3.33&#215;</text>
<text x="114" y="278" font-size="9" fill="#5b6b8c">vertical coarser (Hayman stripes)</text>
<text x="300" y="88" font-size="11" font-weight="700" fill="#28324a">anisotropy ratio</text>
<rect x="300" y="107" width="60" height="139" fill="#c9341a" opacity="0.85"/>
<text x="330" y="102" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">3.33</text>
<text x="330" y="259" font-size="9" fill="#28324a" text-anchor="middle">gravity-</text>
<text x="330" y="270" font-size="9" fill="#28324a" text-anchor="middle">biased</text>
<rect x="378" y="203" width="60" height="43" fill="#2ca25f" opacity="0.85"/>
<text x="408" y="198" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">1.04</text>
<text x="408" y="259" font-size="9" fill="#28324a" text-anchor="middle">isotropic</text>
<text x="408" y="270" font-size="9" fill="#28324a" text-anchor="middle">(falsifier)</text>
<line x1="296" y1="246" x2="456" y2="246" stroke="#33415c"/>
<line x1="296" y1="204" x2="456" y2="204" stroke="#8c8c8c" stroke-dasharray="3 3"/>
<text x="454" y="201" font-size="8" fill="#8c8c8c" text-anchor="end">isotropy = 1</text>
<text x="560" y="88" font-size="11" font-weight="700" fill="#28324a">dose (ratio vs vert. experience)</text>
<rect x="560" y="227" width="34" height="19" fill="#2ca25f" opacity="0.85"/>
<text x="577" y="223" font-size="9" font-weight="700" fill="#0b1324" text-anchor="middle">1.0</text>
<text x="577" y="259" font-size="8.5" fill="#28324a" text-anchor="middle">1.0</text>
<rect x="602" y="215" width="34" height="31" fill="#e6842a" opacity="0.85"/>
<text x="619" y="211" font-size="9" font-weight="700" fill="#0b1324" text-anchor="middle">1.7</text>
<text x="619" y="259" font-size="8.5" fill="#28324a" text-anchor="middle">.6</text>
<rect x="644" y="183" width="34" height="63" fill="#e6842a" opacity="0.85"/>
<text x="661" y="179" font-size="9" font-weight="700" fill="#0b1324" text-anchor="middle">3.3</text>
<text x="661" y="259" font-size="8.5" fill="#28324a" text-anchor="middle">.3</text>
<rect x="686" y="121" width="34" height="125" fill="#c9341a" opacity="0.85"/>
<text x="703" y="117" font-size="9" font-weight="700" fill="#0b1324" text-anchor="middle">6.6</text>
<text x="703" y="259" font-size="8.5" fill="#28324a" text-anchor="middle">.15</text>
<line x1="556" y1="246" x2="728" y2="246" stroke="#33415c"/>
<text x="560" y="276" font-size="8.5" fill="#5b6b8c">less vertical experience &#8594; more anisotropy</text>
<text x="20" y="308" font-size="9.5" fill="#5b6b8c">Absolute vertical error is small (small range) &#8212; only the normalized resolution reveals the disproportionate loss. Isotropic experience = the flying-bat (Ginosar) regime.</text>
</svg>