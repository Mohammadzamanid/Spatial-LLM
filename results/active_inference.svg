<svg xmlns="http://www.w3.org/2000/svg" width="680" height="300" font-family="Segoe UI, Arial">
<rect width="680" height="300" fill="#ffffff"/>
<text x="20" y="26" font-size="15" font-weight="800" fill="#0b1324">Epistemic foraging emerges from a pure goal reward (no exploration term)</text>
<text x="20" y="45" font-size="10.5" fill="#5b6b8c">the agent detours to relocalise ONLY when drift makes uncertainty costly — and stops when there is none to reduce</text>
<text x="40" y="70" font-size="11" font-weight="700" fill="#28324a">detour-to-relocalise</text>
<rect x="40" y="160" width="46" height="88" fill="#2ca25f" opacity="0.85"/>
<text x="63" y="155" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">52%</text>
<text x="63" y="261" font-size="9" fill="#28324a" text-anchor="middle">plan</text>
<text x="63" y="272" font-size="9" fill="#28324a" text-anchor="middle">drift</text>
<rect x="110" y="248" width="46" height="0" fill="#c9341a" opacity="0.85"/>
<text x="133" y="243" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">0%</text>
<text x="133" y="261" font-size="9" fill="#28324a" text-anchor="middle">plan</text>
<text x="133" y="272" font-size="9" fill="#28324a" text-anchor="middle">no-drift</text>
<rect x="180" y="108" width="46" height="140" fill="#2b8cbe" opacity="0.85"/>
<text x="203" y="103" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">82%</text>
<text x="203" y="261" font-size="9" fill="#28324a" text-anchor="middle">learned</text>
<text x="203" y="272" font-size="9" fill="#28324a" text-anchor="middle">drift</text>
<line x1="40" y1="248" x2="250" y2="248" stroke="#33415c"/>
<text x="330" y="70" font-size="11" font-weight="700" fill="#28324a">goal success</text>
<rect x="330" y="168" width="52" height="80" fill="#2ca25f" opacity="0.85"/>
<text x="356" y="163" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">47%</text>
<text x="356" y="261" font-size="9" fill="#28324a" text-anchor="middle">planner</text>
<rect x="390" y="184" width="52" height="64" fill="#2b8cbe" opacity="0.85"/>
<text x="416" y="179" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">38%</text>
<text x="416" y="261" font-size="9" fill="#28324a" text-anchor="middle">learned</text>
<rect x="450" y="212" width="52" height="36" fill="#c9341a" opacity="0.85"/>
<text x="476" y="207" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">21%</text>
<text x="476" y="261" font-size="9" fill="#28324a" text-anchor="middle">greedy</text>
<rect x="510" y="214" width="52" height="34" fill="#8c8c8c" opacity="0.85"/>
<text x="536" y="209" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">20%</text>
<text x="536" y="261" font-size="9" fill="#28324a" text-anchor="middle">u-blind</text>
<rect x="570" y="240" width="52" height="8" fill="#c9a13a" opacity="0.85"/>
<text x="596" y="235" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">4%</text>
<text x="596" y="261" font-size="9" fill="#28324a" text-anchor="middle">random</text>
<line x1="330" y1="248" x2="630" y2="248" stroke="#33415c"/>
<text x="40" y="292" font-size="10" fill="#5a6b8c">reward = reach the goal only; the detour, and its dependence on uncertainty, are never in the objective.</text>
</svg>