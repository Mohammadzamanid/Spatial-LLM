<svg xmlns="http://www.w3.org/2000/svg" width="650" height="332" font-family="Segoe UI, Arial">
<rect width="650" height="332" fill="#ffffff"/>
<text x="26" y="24" font-size="15" font-weight="800" fill="#0b1324">Reward-triggered BTSP: place fields that ANTICIPATE the reward</text>
<text x="26" y="42" font-size="10.5" fill="#5b6b8c">fields sit upstream of the reward (predictive); vanishes with a symmetric kernel; grows with speed &#8212; emergent, not by construction</text>
