<text x="140" y="210" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">-0.23</text>
<text x="140" y="274" font-size="10" fill="#28324a" text-anchor="middle">BTSP (asym)</text>
<rect x="220" y="66" width="60" height="10.3" fill="#3182bd" opacity="0.88"/>
<text x="250" y="89" font-size="11" font-weight="700" fill="#0b1324" text-anchor="middle">+0.02</text>
<text x="250" y="274" font-size="10" fill="#28324a" text-anchor="middle">symmetric</text>
<text x="380" y="54" font-size="11.5" font-weight="700" fill="#0b1324">speed dependence (BTSP)</text>
<line x1="380" y1="66" x2="600.0" y2="66" stroke="#33415c" stroke-dasharray="3 3"/>
