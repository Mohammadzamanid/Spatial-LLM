<text x="578" y="263" font-size="8.5" fill="#28324a" text-anchor="middle">SHUFFLED</text>
<text x="384" y="286" font-size="9" fill="#5b6b8c">a power-only (1-D) read is &#8804;0.5 on off-axis triples by construction</text>
