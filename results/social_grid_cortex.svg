<svg xmlns="http://www.w3.org/2000/svg" width="654" height="328" font-family="Segoe UI, Arial">
<rect width="654" height="328" fill="#ffffff"/>
<text x="26" y="24" font-size="15" font-weight="800" fill="#0b1324">Social grid: a dissociable 2-D social map from the frozen cortex (CPU de-risk, #9)</text>
<text x="26" y="42" font-size="10.5" fill="#5b6b8c">dominance reads the POWER axis (not affiliation); "socially closer" needs a genuine 2-D metric; shuffled positions collapse both</text>
<text x="60" y="56" font-size="11.5" font-weight="700" fill="#0b1324">(A) dominance read-out (higher=better)</text>
<line x1="60" y1="250" x2="310" y2="250" stroke="#33415c"/>
<line x1="60" y1="167" x2="310" y2="167" stroke="#9aa6bd" stroke-dasharray="4 3"/>
<text x="308" y="164" font-size="8.5" fill="#9aa6bd" text-anchor="end">chance 0.5</text>
<rect x="80" y="90.4" width="52" height="159.6" fill="#2ca25f" opacity="0.9"/>
<text x="106" y="84" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">0.962</text>
<text x="106" y="263" font-size="8.5" fill="#28324a" text-anchor="middle">POWER</text>
<text x="106" y="273" font-size="8.5" fill="#28324a" text-anchor="middle">axis</text>
<rect x="154" y="174.5" width="52" height="75.5" fill="#c98a1a" opacity="0.9"/>
<text x="180" y="168" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">0.455</text>
<text x="180" y="263" font-size="8.5" fill="#28324a" text-anchor="middle">AFFIL</text>
<text x="180" y="273" font-size="8.5" fill="#28324a" text-anchor="middle">axis</text>
<rect x="228" y="177.3" width="52" height="72.7" fill="#c9341a" opacity="0.9"/>
<text x="254" y="171" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">0.438</text>
<text x="254" y="263" font-size="8.5" fill="#28324a" text-anchor="middle">SHUFFLED</text>
<text x="60" y="286" font-size="9" fill="#5b6b8c">dominance is read from POWER, not affiliation — the axes are separable</text>
<text x="384" y="56" font-size="11.5" font-weight="700" fill="#0b1324">(B) off-axis "socially closer" (2-D, higher=better)</text>
<line x1="384" y1="250" x2="634" y2="250" stroke="#33415c"/>
