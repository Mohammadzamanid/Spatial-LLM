<text x="430" y="138" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">0.639</text>
<text x="430" y="263" font-size="8.5" fill="#28324a" text-anchor="middle">frozen</text>
<text x="430" y="273" font-size="8.5" fill="#28324a" text-anchor="middle">code</text>
<rect x="478" y="122.8" width="52" height="127.2" fill="#4ca66f" opacity="0.9"/>
<text x="504" y="117" font-size="10.5" font-weight="700" fill="#0b1324" text-anchor="middle">0.766</text>
