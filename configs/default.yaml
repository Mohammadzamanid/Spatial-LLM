model:
  vocab_size: 50257
  d_model: 256
  n_layers: 6
  n_heads: 4
  n_reference_frames: 4
  max_seq_len: 512
  dropout: 0.1
  n_schema_types: 8
  memory_slots: 256
  visual_dim: 512

training:
  batch_size: 8
  learning_rate: 5.0e-05
  weight_decay: 0.01
  num_epochs: 10
  gradient_clip: 0.5
  warmup_steps: 200
  scheduler_type: cosine
  aux_loss_weight: 0.01
  temporal_smoothness_weight: 0.005
  velocity_loss_weight: 0.05
  vector_loss_weight: 0.05
  patience: 5
  min_delta: 0.001

data:
  train_path: null
  val_path: null
  test_path: null
  max_seq_len: 256
  num_workers: 2
  num_samples: 1000
  num_val_samples: 200
  synthetic: true

spatial:
  max_spatial_distance: 50.0
  temporal_decay: 0.1
  use_rotation_equivariance: false

logging:
  log_dir: ./logs
  checkpoint_dir: ./checkpoints
  save_every: 2
  log_every: 20
  use_wandb: false
  wandb_project: spatial-llm
  wandb_entity: null

evaluation:
  eval_every: 1
  metrics: [perplexity, spatial_accuracy, temporal_consistency]
