# ─────────────────────────────────────────────
# Spatial-LLM Training Configuration
# ─────────────────────────────────────────────

model:
  base_llm: "mistralai/Mistral-7B-v0.1"   # swap for meta-llama/Meta-Llama-3-8B
  load_in_4bit: true                       # QLoRA — fits a free T4 GPU (~4GB vs ~14GB)
  vit_backbone: "google/vit-base-patch16-224"
  coord_embed_dim: 256
  coord_num_freqs: 64
  fusion_num_heads: 8

lora:
  r: 16
  lora_alpha: 32
  target_modules: ["q_proj", "v_proj"]
  lora_dropout: 0.05

training:
  output_dir: "outputs/run_001"
  num_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  fp16: true
  logging_steps: 50
  eval_steps: 200
  save_steps: 500
  save_total_limit: 3

data:
  train_path: "data/processed/train.jsonl"
  val_path: "data/processed/val.jsonl"
  tile_dir: "data/tiles/"
  max_text_length: 512
  tile_size: 224
  zoom_level: 15                           # OSM zoom level for tile fetching

wandb:
  project: "spatial-llm"
  entity: null                             # set to your wandb username
